name: CI

# Hardhat loads apps/contracts/env.ts at config time. Unit tests use the in-process
# Hardhat network only — these are public Anvil account #0 / placeholder values, not secrets.
env:
  FC_PVT_KEY: "0xac0974bec39a17e36ba4b97b1c1f6b4c1d1e8e8e8e8e8e8e8e8e8e8e8e8e8e"
  ALCHEMY_API_KEY: "ci-placeholder"

on:
  pull_request:
  push:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sanity:
    name: sanity
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "25"

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Install dependencies
        run: bun install

      - name: sanity
        run: bun run sanity
        env:
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ vars.TURBO_TEAM }}

  contracts:
    name: contracts
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "25"

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - run: bun install

      - name: Hardhat test suite
        run: bun run --cwd apps/contracts test
